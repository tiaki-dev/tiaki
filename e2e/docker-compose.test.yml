services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: tiaki_test
      POSTGRES_USER: tiaki
      POSTGRES_PASSWORD: tiaki
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiaki"]
      interval: 2s
      timeout: 5s
      retries: 20
    networks:
      - tiaki-test-net

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    networks:
      - tiaki-test-net

  server:
    build:
      context: ../control/server
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://tiaki:tiaki@postgres:5432/tiaki_test
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: test
      JWT_SECRET: test-secret-do-not-use-in-prod
    ports:
      - "13001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 3s
      timeout: 5s
      retries: 15
    networks:
      - tiaki-test-net

  # Test target containers — these are what the agent will scan
  test-nginx:
    image: nginx:1.29-alpine
    container_name: tiaki-test-nginx
    networks:
      - tiaki-test-net

  # Test container with explicit "latest" tag — exercises digest-based update detection
  test-nginx-latest:
    image: nginx:latest
    container_name: tiaki-test-nginx-latest
    networks:
      - tiaki-test-net

  test-redis:
    image: redis:7.0-alpine
    container_name: tiaki-test-redis
    networks:
      - tiaki-test-net

networks:
  tiaki-test-net:
    name: tiaki-test-net
