name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  agent-test:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  control-test:
    name: Control Plane (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: control/.nvmrc

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  build-and-push:
    name: Build & Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [agent-test, control-test]
    strategy:
      matrix:
        include:
          - image: tiaki-agent-docker
            context: agent
            dockerfile: agent/Dockerfile.docker
          - image: tiaki-agent-k8s
            context: agent
            dockerfile: agent/Dockerfile.k8s
          - image: tiaki-server
            context: control
            dockerfile: control/server/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: tiakidev/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  dockerhub-description:
    name: Docker Hub Description (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [build-and-push]
    strategy:
      matrix:
        include:
          - image: tiaki-agent-docker
            readme: .github/docker/tiaki-agent-docker.md
          - image: tiaki-agent-k8s
            readme: .github/docker/tiaki-agent-k8s.md
          - image: tiaki-server
            readme: .github/docker/tiaki-server.md
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: tiakidev/${{ matrix.image }}
          readme-filepath: ${{ matrix.readme }}

  helm-release:
    name: Release Helm Charts
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Update Helm chart versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version:.*/version: $VERSION/" charts/tiaki-agent/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/tiaki-agent/Chart.yaml
          sed -i "s/^version:.*/version: $VERSION/" charts/tiaki-control/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"$VERSION\"/" charts/tiaki-control/Chart.yaml

      - name: Update Helm dependencies
        run: |
          cd charts/tiaki-control
          helm dependency update

      - name: Package and release Helm charts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          
          # Package charts
          mkdir -p .cr-release-packages
          helm package charts/tiaki-agent -d .cr-release-packages
          helm package charts/tiaki-control -d .cr-release-packages
          
          # Create GitHub releases and upload assets
          for chart in .cr-release-packages/*.tgz; do
            chart_name=$(basename "$chart" .tgz)
            
            # Check if release already exists
            if ! gh release view "$chart_name" >/dev/null 2>&1; then
              gh release create "$chart_name" "$chart" \
                --title "$chart_name" \
                --notes "Helm chart release for $chart_name"
            fi
          done
          
          # Update Helm repo index
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
          
          # Clone gh-pages branch
          git clone --single-branch --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY.git" gh-pages
          cd gh-pages
          
          # Generate index
          helm repo index . --url "https://github.com/$GITHUB_REPOSITORY/releases/download" --merge index.yaml || helm repo index . --url "https://github.com/$GITHUB_REPOSITORY/releases/download"
          
          # Copy chart packages
          cp ../.cr-release-packages/*.tgz .
          
          # Commit and push
          git add .
          git commit -m "Update Helm repository index for $VERSION" || true
          git push origin gh-pages
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push, helm-release]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found && /^---/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Helm Charts

            ```bash
            helm repo add tiaki https://charts.tiaki.dev
            helm repo update
            
            # Install agent
            helm install tiaki-agent tiaki/tiaki-agent --version ${{ github.ref_name }}
            
            # Install control plane
            helm install tiaki-control tiaki/tiaki-control --version ${{ github.ref_name }}
            ```

            ## Docker Images

            ```bash
            docker pull tiakidev/tiaki-agent-docker:${{ github.ref_name }}
            docker pull tiakidev/tiaki-agent-k8s:${{ github.ref_name }}
            docker pull tiakidev/tiaki-server:${{ github.ref_name }}
            ```

            ## Changes

            ${{ steps.changelog.outputs.notes }}
