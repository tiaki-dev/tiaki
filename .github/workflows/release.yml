name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  agent-test:
    name: Agent (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agent/go.mod
          cache-dependency-path: agent/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  control-test:
    name: Control Plane (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: control/.nvmrc

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

  build-and-push:
    name: Build & Push (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [agent-test, control-test]
    strategy:
      matrix:
        include:
          - image: tiaki-agent-docker
            context: agent
            dockerfile: agent/Dockerfile.docker
          - image: tiaki-agent-k8s
            context: agent
            dockerfile: agent/Dockerfile.k8s
          - image: tiaki-server
            context: control
            dockerfile: control/server/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: tiakidev/${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  dockerhub-description:
    name: Docker Hub Description (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [build-and-push]
    strategy:
      matrix:
        include:
          - image: tiaki-agent-docker
            readme: .github/docker/tiaki-agent-docker.md
          - image: tiaki-agent-k8s
            readme: .github/docker/tiaki-agent-k8s.md
          - image: tiaki-server
            readme: .github/docker/tiaki-server.md
    steps:
      - uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: tiakidev/${{ matrix.image }}
          readme-filepath: ${{ matrix.readme }}

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-and-push]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Docker Images

            ```
            docker pull tiakidev/tiaki-agent-docker:${{ github.ref_name }}
            docker pull tiakidev/tiaki-agent-k8s:${{ github.ref_name }}
            docker pull tiakidev/tiaki-server:${{ github.ref_name }}
            ```

            ## Changes

            ${{ steps.changelog.outputs.notes }}
